<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order your movie</title>
</head>
<style>
body {
    margin: 0;
    height: 100vh;
    font-family: Arial, sans-serif;
    overflow: hidden;
    
    /* Sunset gradient background */
    background: linear-gradient(to right, #1e3c72, #2a5298, #ff9966);
    position: relative;
}

/* Light blur circles (cinema effect) */
body::before {
    content: "";
    position: absolute;
    width: 100%;
    height: 100%;
    background: radial-gradient(circle, rgba(255,255,255,0.2) 10%, transparent 10%);
    background-size: 150px 150px;
    animation: move 20s linear infinite;
}

/* Film strip effect */
.film-strip {
    position: absolute;
    top: 0;
    left: 10%;
    width: 120px;
    height: 100%;
    background: repeating-linear-gradient(
        to bottom,
        black 0px,
        black 40px,
        white 40px,
        white 60px
    );
    opacity: 0.6;
    transform: rotate(10deg);
}

/* Animation */
@keyframes move {
    from { background-position: 0 0; }
    to { background-position: 300px 300px; }
}

/* Center text */
.content {
    position: relative;
    color: white;
    text-align: center;
    top: 40%;
}

h1 {
    font-size: 50px;
}

p {
    font-size: 20px;
}
</style>

<body >
    <form  method="post">
        <table border="0" cellspacing="20" cellpadding="20">
     <tr>
        <td>
            <label for="name">Name</label>
        </td>
        <td><input type="text" name="name" required placeholder="enter your name"></td>
     </tr>
     <tr>
        <td>
            <label for="email">Email</label>
        </td>
        <td><input type="email" name="email" required placeholder="enter your email"></td>
     </tr>

     <tr>
        <td>
            <label for="movies">Movie Name</label>
        </td>
        <td><input type="text" name="movie_name" required placeholder="enter name of movie"></td>
     </tr>
     <tr>
        <td>
            <label for="time">Date</label>
        </td>
        <td><input type="date" name="date" required></td>
     </tr>
        </table>
        <button type="submit">Submit</button><br>
    <a href="HAMPER.html">back</a>
    </form>
    
    <body>

</html>
